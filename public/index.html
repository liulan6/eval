<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生物视频理解 · 语音讲述评分</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🧬 生物视频理解 · 语音讲述评分</h1>

    <section class="card">
      <h2>① 视频内容（内分泌与激素）</h2>
      <p class="video-text">内分泌腺没有导管，它们分泌的激素进入腺体内的毛细血管，随着循环系统传送到身体各处，直到碰到特定的组织细胞，我们把这些细胞叫做激素的靶细胞，就像一把钥匙只能开一把锁那样，不是该激素的靶细胞不会受到这种激素的影响。</p>
    </section>

    <section class="card">
      <h2>② 学生语音讲述（中文）</h2>
      <div class="controls">
        <button id="recordBtn">🎤 开始录音</button>
        <span id="status" class="status">未开始</span>
      </div>
      <textarea id="studentText" rows="5" placeholder="点击录音说出你对视频的理解，转写文字会显示在这里，也可手动修改..."></textarea>
    </section>

    <section class="card">
      <button id="evalBtn" class="primary">③ 提交 AI 评分</button>
    </section>

    <section class="card result hidden" id="resultCard">
      <h2>📊 评分结果</h2>
      <div class="score-box">总分：<span id="score">--</span> / <span id="totalFull">10</span></div>
      <table class="rubric-table">
        <thead>
          <tr><th>评价指标</th><th>得分</th></tr>
        </thead>
        <tbody id="rubricBody"></tbody>
      </table>
      <h3>整体点评</h3>
      <p id="comment"></p>
      <h3>科学性错误</h3>
      <ul id="errors"></ul>
      <h3>改进建议</h3>
      <ul id="suggestions"></ul>
    </section>
  </div>

  <script src="recorder.js"></script>
  <script src="app.js"></script>
</body>
</html>
